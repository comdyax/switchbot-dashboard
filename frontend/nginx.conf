server {
    listen 80;
    root /usr/share/nginx/html;

    # Reverse-proxy API calls to the backend service over the compose network.
    # `backend` resolves via Docker's service DNS. Same origin as the app → no CORS.
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # SPA fallback: serve index.html for anything that isn't a real file.
    location / {
        try_files $uri /index.html;
    }
}
